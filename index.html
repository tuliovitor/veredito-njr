<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Veredito NJR — Vote se o Neymar deveria ir para a Copa do Mundo. Dê seu veredito agora!" />
    <title>Veredito NJR</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
</head>

<body>
    <div id="bg" aria-hidden="true">
        <img src="./assets/bg-desktop.webp" alt="" class="bg-desktop" />
        <img src="./assets/bg-mobile.webp" alt="" class="bg-mobile" />
    </div>

    <main id="app">
        <div id="card">
            <div class="badge">
                <span class="badge-dot"></span>
                ⚽ Veredito NJR
            </div>
            <div id="screen-container">
                <noscript>
                    <p style="color:white;text-align:center;padding:20px;">
                        Ative o JavaScript para votar.
                    </p>
                </noscript>
                <div id="js-fallback">
                    <h1 class="title-display">Qual é seu nome, torcedor (a)?</h1>
                    <p class="subtitle">Antes de votar, nos diz quem você é</p>
                    <input
                        class="input-field"
                        type="text"
                        id="name-input"
                        maxlength="32"
                        autocomplete="off"
                        placeholder="Ex: Tulio Vítor..."
                    />
                    <button class="btn btn-primary" id="btn-continue" disabled>
                        Continuar →
                    </button>
                </div>
            </div>
        </div>
    </main>

    <noscript>
        <style>
            #app {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .noscript-msg {
                color: white;
                text-align: center;
                font-family: sans-serif;
                padding: 32px;
            }
        </style>
        <div class="noscript-msg">
            <p>Ative o JavaScript para acessar o Veredito NJR. ⚽</p>
        </div>
    </noscript>

    <script src="scripts.js" defer></script>
</body>

</html>
